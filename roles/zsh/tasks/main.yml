- name: Install zsh and plugins
  homebrew:
    name: "{{ zsh_brew_packages }}"
    state: present

- name: Get Homebrew prefix
  command: brew --prefix
  register: zsh_brew_prefix
  changed_when: false

- name: Locate zsh binary
  command: which zsh
  register: zsh_bin
  changed_when: false

- name: Ensure zsh config directory exists
  file:
    path: "{{ lookup('env', 'HOME') }}/.config"
    state: directory

- name: Ensure fzf config directory exists
  file:
    path: "{{ lookup('env', 'HOME') }}/.config/fzf"
    state: directory

- name: Ensure zsh scripts directory exists
  file:
    path: "{{ lookup('env', 'HOME') }}/.config/zsh"
    state: directory

- name: Deploy fzf zsh config
  template:
    src: fzf.zsh.j2
    dest: "{{ lookup('env', 'HOME') }}/.config/fzf/fzf.zsh"
    backup: yes

- name: Deploy LastPass picker script
  copy:
    src: lpass.sh
    dest: "{{ lookup('env', 'HOME') }}/.config/zsh/lpass.sh"
    mode: "0755"

- name: Deploy LastPass zsh helpers
  template:
    src: lpass.zsh.j2
    dest: "{{ lookup('env', 'HOME') }}/.config/zsh/lpass.zsh"
    backup: yes

- name: Deploy starship config
  template:
    src: starship.toml.j2
    dest: "{{ lookup('env', 'HOME') }}/.config/starship.toml"
    backup: yes

- name: Deploy zshrc
  template:
    src: zshrc.j2
    dest: "{{ lookup('env', 'HOME') }}/.zshrc"
    backup: yes

- name: Register zsh in /etc/shells
  become: true
  when: zsh_set_default_shell | bool
  tags: ['chsh']
  lineinfile:
    path: /etc/shells
    line: "{{ zsh_bin.stdout | trim }}"
    state: present

- name: Set zsh as the default login shell
  become: true
  when: zsh_set_default_shell | bool
  tags: ['chsh']
  user:
    name: "{{ lookup('env', 'USER') }}"
    shell: "{{ zsh_bin.stdout | trim }}"
