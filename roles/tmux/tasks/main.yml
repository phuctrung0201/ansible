- name: Install tmux
  homebrew:
    name: tmux
    state: present

- name: Ensure tmux config directory exists
  file:
    path: "{{ ansible_env.HOME }}/.config/tmux"
    state: directory

- name: Install tmux.zsh (auto-attach and tmux status-line helpers)
  template:
    src: tmux.zsh.j2
    dest: "{{ ansible_env.HOME }}/.config/tmux/tmux.zsh"
    mode: "0644"

- name: Install leader theme from share.yml
  template:
    src: leader_theme.yml.j2
    dest: "{{ ansible_env.HOME }}/.config/tmux/leader_theme.yml"

- name: Build tmux-leader binary
  command:
    cmd: "cargo build --release --manifest-path {{ playbook_dir }}/roles/tmux/leader/Cargo.toml"
  register: cargo_build
  changed_when: "'Compiling' in cargo_build.stderr"

- name: Copy tmux-leader binary
  copy:
    src: "{{ playbook_dir }}/roles/tmux/leader/target/release/tmux-leader"
    dest: "{{ ansible_env.HOME }}/.config/tmux/tmux-leader"
    mode: "0755"

- name: Deploy tmux.conf
  template:
    src: tmux.conf.j2
    dest: "{{ ansible_env.HOME }}/.config/tmux/tmux.conf"
    backup: yes

- name: Ensure ~/.tmux.conf sources XDG config
  copy:
    dest: "{{ ansible_env.HOME }}/.tmux.conf"
    content: |
      # Ansible (roles/tmux): full config lives in ~/.config/tmux/tmux.conf
      source-file ~/.config/tmux/tmux.conf
    backup: yes

- name: Source tmux auto-attach in zshrc
  lineinfile:
    path: "{{ ansible_env.HOME }}/.zshrc"
    line: "source ~/.config/tmux/tmux.zsh"
