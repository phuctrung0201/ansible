- name: Install tmux and palette dependencies
  community.general.homebrew:
    name: "{{ item }}"
    state: present
  loop:
    - tmux
    - fzf
    - lastpass-cli

- name: Ensure tmux config directory exists
  file:
    path: "~/.config/tmux"
    state: directory

- name: Deploy tmux config
  template:
    src: tmux.conf.j2
    dest: "~/.config/tmux/tmux.conf"
    backup: true

- name: Deploy tmux command palette
  copy:
    src: palette.sh
    dest: "~/.config/tmux/palette.sh"
    mode: "0755"

- name: Deploy tmux lpass picker
  copy:
    src: lpass.sh
    dest: "~/.config/tmux/lpass.sh"
    mode: "0755"

- name: Reload tmux config (if server running)
  shell: tmux info >/dev/null 2>&1 && tmux source-file ~/.config/tmux/tmux.conf || true
  changed_when: false
