- name: Install tmux
  homebrew:
    name: tmux
    state: present

- name: Ensure tmux config directory exists
  file:
    path: "{{ ansible_env.HOME }}/.config/tmux"
    state: directory

- name: Copy tmux config
  template:
    src: tmux.conf.j2
    dest: "{{ ansible_env.HOME }}/.config/tmux/tmux.conf"
    backup: yes

- name: Copy tmux leader theme
  template:
    src: leader-theme.j2
    dest: "{{ ansible_env.HOME }}/.config/tmux/leader-theme"

- name: Build tmux leader binary
  command:
    cmd: cargo build --release --manifest-path roles/tmux/leader/Cargo.toml
    chdir: "{{ playbook_dir }}"
  changed_when: true

- name: Copy tmux leader binary
  copy:
    src: "{{ playbook_dir }}/roles/tmux/leader/target/release/tmux-leader"
    dest: "{{ ansible_env.HOME }}/.config/tmux/leader"
    mode: "0755"

- name: Copy tmux zsh integration
  template:
    src: tmux.zsh.j2
    dest: "{{ ansible_env.HOME }}/.config/tmux/tmux.zsh"

- name: Remove legacy tmux-attach block from .zshrc
  blockinfile:
    path: "{{ ansible_env.HOME }}/.zshrc"
    marker: "# {mark} TMUX ATTACH"
    state: absent

- name: Source tmux.zsh before Oh My Zsh
  blockinfile:
    path: "{{ ansible_env.HOME }}/.zshrc"
    marker: "# {mark} TMUX"
    insertbefore: 'source $ZSH/oh-my-zsh.sh'
    block: |
      source ~/.config/tmux/tmux.zsh

- name: Remove legacy tmux-attach script
  file:
    path: "{{ ansible_env.HOME }}/.config/tmux/tmux-attach.zsh"
    state: absent
