- name: Install tmux
  community.general.homebrew:
    name: tmux
    state: present

- name: Ensure tmux config directory exists
  file:
    path: "~/.config/tmux"
    state: directory

- name: Deploy tmux config
  template:
    src: tmux.conf.j2
    dest: "~/.config/tmux/tmux.conf"

- name: Copy tmux zsh config
  template:
    src: tmux.zsh.j2
    dest: "~/.config/tmux/tmux.zsh"

- name: Source tmux.zsh from zshrc
  lineinfile:
    path: "~/.zshrc"
    line: "source ~/.config/tmux/tmux.zsh"
    state: present
