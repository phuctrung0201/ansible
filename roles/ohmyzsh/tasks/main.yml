- name: Check if Oh My Zsh is installed
  stat:
    path: "{{ ansible_env.HOME }}/.oh-my-zsh"
  register: ohmyzsh_dir

- name: Install Oh My Zsh (if not installed)
  shell: |
    RUNZSH=no CHSH=no KEEP_ZSHRC=yes \
    sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"
  args:
    executable: /bin/bash
  when: not ohmyzsh_dir.stat.exists

- name: Ensure zsh-autosuggestions plugin is installed
  git:
    repo: https://github.com/zsh-users/zsh-autosuggestions.git
    dest: "{{ ansible_env.HOME }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions"

- name: Ensure fast-syntax-highlighting plugin is installed
  git:
    repo: https://github.com/zdharma-continuum/fast-syntax-highlighting.git
    dest: "{{ ansible_env.HOME }}/.oh-my-zsh/custom/plugins/fast-syntax-highlighting"

- name: Ensure zsh config directory for Ansible theme
  file:
    path: "{{ ansible_env.HOME }}/.config/zsh"
    state: directory
    mode: "0755"

- name: Deploy zsh theme from share.yml
  template:
    src: ansible-theme.zsh.j2
    dest: "{{ ansible_env.HOME }}/.config/zsh/ansible-theme.zsh"
    mode: "0644"

- name: Configure .zshrc settings
  lineinfile:
    path: "{{ ansible_env.HOME }}/.zshrc"
    line: "{{ item }}"
    state: present
    create: yes
  loop:
    - 'export XDG_CONFIG_HOME="$HOME/.config"'
    - 'export ZSH="$HOME/.oh-my-zsh"'
    - 'ZSH_THEME="robbyrussell"'
    - 'plugins=(git z zsh-autosuggestions fast-syntax-highlighting)'
    - 'DISABLE_AUTO_UPDATE=true'
    - 'source $ZSH/oh-my-zsh.sh'

- name: Source Ansible zsh theme (prompt + highlights from share.yml)
  blockinfile:
    path: "{{ ansible_env.HOME }}/.zshrc"
    marker: "# {mark} ANSIBLE ohmyzsh PROMPT"
    insertafter: '^source \$ZSH/oh-my-zsh\.sh'
    block: |
      source "${HOME}/.config/zsh/ansible-theme.zsh"

