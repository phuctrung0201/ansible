- name: Check if Oh My Zsh is installed
  stat:
    path: "{{ ansible_env.HOME }}/.oh-my-zsh"
  register: ohmyzsh_dir

- name: Install Oh My Zsh (if not installed)
  shell: |
    RUNZSH=no CHSH=no KEEP_ZSHRC=yes \
    sh -c "$(curl -fsSL https://raw.githubusercontent.com/ohmyzsh/ohmyzsh/master/tools/install.sh)"
  args:
    executable: /bin/bash
  when: not ohmyzsh_dir.stat.exists

- name: Ensure zsh-autosuggestions plugin is installed
  git:
    repo: https://github.com/zsh-users/zsh-autosuggestions.git
    dest: "{{ ansible_env.HOME }}/.oh-my-zsh/custom/plugins/zsh-autosuggestions"

- name: Ensure zsh-syntax-highlighting plugin is installed
  git:
    repo: https://github.com/zsh-users/zsh-syntax-highlighting.git
    dest: "{{ ansible_env.HOME }}/.oh-my-zsh/custom/plugins/zsh-syntax-highlighting"

- name: Add tmux edit-command-line widget to .zshrc
  blockinfile:
    path: "{{ ansible_env.HOME }}/.zshrc"
    marker: "# {mark} TMUX EDIT COMMAND LINE"
    block: |
      _tmux_edit_command_line() {
        print -rn -- "$BUFFER" > /tmp/tmux-edit-cmd.txt
        tmux display-popup -E -w 90% -h 90% "nvim /tmp/tmux-edit-cmd.txt"
        BUFFER=$(< /tmp/tmux-edit-cmd.txt)
        CURSOR=$#BUFFER
        zle reset-prompt
      }
      zle -N _tmux_edit_command_line
      bindkey '^X^E' _tmux_edit_command_line

- name: Configure .zshrc settings
  lineinfile:
    path: "{{ ansible_env.HOME }}/.zshrc"
    line: "{{ item }}"
    state: present
    create: yes
  loop:
    - 'export XDG_CONFIG_HOME="$HOME/.config"'
    - 'export ZSH="$HOME/.oh-my-zsh"'
    - 'ZSH_THEME="refined"'
    - 'plugins=(git z zsh-autosuggestions zsh-syntax-highlighting)'
    - 'DISABLE_AUTO_UPDATE=true'
    - 'source $ZSH/oh-my-zsh.sh'
