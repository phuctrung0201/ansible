- name: Install nushell and plugins
  homebrew:
    name: "{{ nushell_brew_packages }}"
    state: present

- name: Get Homebrew prefix
  command: brew --prefix
  register: nushell_brew_prefix
  changed_when: false

- name: Ensure nushell config directory exists
  file:
    path: "{{ nushell_config_dir }}"
    state: directory

- name: Ensure carapace bin directory exists
  file:
    path: "{{ lookup('env', 'HOME') }}/.config/carapace/bin"
    state: directory

- name: Deploy env.nu
  template:
    src: env.nu.j2
    dest: "{{ nushell_config_dir }}/env.nu"
    backup: yes

- name: Deploy config.nu
  template:
    src: config.nu.j2
    dest: "{{ nushell_config_dir }}/config.nu"
    backup: yes

- name: Generate carapace completions
  shell: >-
    carapace _carapace nushell > "{{ nushell_config_dir }}/carapace.nu"
  changed_when: false

- name: Generate zoxide init
  shell: zoxide init nushell > "{{ nushell_config_dir }}/zoxide.nu"
  changed_when: false

- name: Check for mise
  stat:
    path: "{{ nushell_brew_prefix.stdout | trim }}/bin/mise"
  register: nushell_mise

- name: Generate mise activation
  shell: "{{ nushell_brew_prefix.stdout | trim }}/bin/mise activate nu > \"{{ nushell_config_dir }}/mise.nu\""
  when: nushell_mise.stat.exists
  changed_when: false

- name: Remove stale XDG nushell config directory
  file:
    path: "{{ lookup('env', 'HOME') }}/.config/nushell"
    state: absent
