- name: Install fzf
  community.general.homebrew:
    name: fzf
    state: present

- name: Install bat
  community.general.homebrew:
    name: bat
    state: present

- name: Ensure fzf config directory exists
  file:
    path: "~/.config/fzf"
    state: directory

- name: Deploy fzf zsh config
  template:
    src: fzf.zsh.j2
    dest: "~/.config/fzf/fzf.zsh"

- name: Source fzf.zsh from zshrc
  lineinfile:
    path: "~/.zshrc"
    line: "source ~/.config/fzf/fzf.zsh"
    state: present

- name: Set PAGER environment variable
  lineinfile:
    path: "~/.zshrc"
    line: 'export PAGER=bat'
    state: present
