- name: Ensure Homebrew is installed
  stat:
    path: /opt/homebrew/bin/brew
  register: brew_check

- name: Install Homebrew if not present
  shell: /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
  when: not brew_check.stat.exists

- name: Install ripgrep
  homebrew:
    name: ripgrep
    state: present

- name: Uninstall Ghostty (removed from playbook)
  homebrew_cask:
    name: ghostty
    state: absent

- name: Uninstall tmux (removed from playbook)
  homebrew:
    name: tmux
    state: absent

- name: Remove Ghostty config directory
  file:
    path: "{{ ansible_env.HOME }}/.config/ghostty"
    state: absent

- name: Remove tmux config directory
  file:
    path: "{{ ansible_env.HOME }}/.config/tmux"
    state: absent

- name: Remove tmux zsh integration block from .zshrc
  blockinfile:
    path: "{{ ansible_env.HOME }}/.zshrc"
    marker: "# {mark} TMUX"
    state: absent

