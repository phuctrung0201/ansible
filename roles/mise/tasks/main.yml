- name: Install mise
  homebrew:
    name: mise
    state: present

- name: Ensure mise config directory exists
  file:
    path: "~/.config/mise"
    state: directory

- name: Copy the mise config file
  copy:
    src: "config"
    dest: "~/.config/mise/config.toml"
    backup: yes

- name: Ensure global tools installed
  shell: "mise install"
  changed_when: false

- name: Add mise init line to .zshrc (if not already there)
  lineinfile:
    path: "~/.zshrc"
    line: 'eval "$(mise activate zsh)"'
    insertafter: EOF
    state: present
