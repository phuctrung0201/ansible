- name: Install neovim and dependencies
  homebrew:
    name: "{{ item }}"
    state: present
  loop:
    - neovim
    - lazygit
    - ripgrep
    - lastpass-cli

- name: Set LPASS_AGENT_TIMEOUT to never expire
  lineinfile:
    path: "~/.zshrc"
    line: 'export LPASS_AGENT_TIMEOUT=0'
    state: present

- name: Ensure nvim config directory exists
  file:
    path: "~/.config/nvim" 
    state: directory

- name: Sync nvim config (remove files not in source)
  synchronize:
    src: nvim/
    dest: "~/.config/nvim/"
    delete: yes
    recursive: yes

- name: Template env.lua with shared theme colors
  template:
    src: env.lua.j2
    dest: "~/.config/nvim/lua/config/env.lua"
    backup: yes

- name: Set EDITOR environment variable
  lineinfile:
    path: "~/.zshrc"
    regexp: '^export EDITOR='
    line: 'export EDITOR="nvim"'
    state: present
    create: yes

- name: Add wiki alias
  lineinfile:
    path: "~/.zshrc"
    regexp: "^alias wiki="
    line: "alias wiki='nvim +WikiJournal'"
    state: present

- name: Ensure wiki directory exists
  file:
    path: "~/wiki"
    state: directory
    mode: "0755"

- name: Ensure wiki index exists (empty installs only)
  copy:
    dest: "~/wiki/index.md"
    content: |
      # Wiki
    force: false
