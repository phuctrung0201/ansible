- name: Install neovim and dependencies
  homebrew:
    name: "{{ item }}"
    state: present
  loop:
    - neovim
    - lazygit
    - ripgrep

- name: Ensure nvim config directory exists
  file:
    path: "~/.config/nvim" 
    state: directory

- name: Sync nvim config (remove files not in source)
  synchronize:
    src: nvim/
    dest: "~/.config/nvim/"
    delete: yes
    recursive: yes

- name: Template env.lua with shared theme colors
  template:
    src: env.lua.j2
    dest: "~/.config/nvim/lua/config/env.lua"
    backup: yes

- name: Ensure wiki directory exists
  file:
    path: "~/wiki"
    state: directory
    mode: "0755"

- name: Ensure wiki home exists (empty installs only)
  copy:
    dest: "~/wiki/home.md"
    content: |
      # Wiki

      → [[.meta/index|Vault guide]]
    force: false

- name: Ensure obsidian templates directory exists in vault
  file:
    path: "~/wiki/_templates"
    state: directory
    mode: "0755"

- name: Install journal template into vault
  copy:
    src: templates/journal.md
    dest: "~/wiki/_templates/journal.md"

- name: Install note template into vault
  copy:
    src: templates/note.md
    dest: "~/wiki/_templates/note.md"
