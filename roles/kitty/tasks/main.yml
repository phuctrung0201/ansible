- name: Install kitty
  homebrew:
    name: kitty
    state: present

- name: Ensure the kitty config directory exists
  file:
    path: "{{ ansible_env.HOME }}/.config/kitty"
    state: directory

- name: Copy kitty config
  template:
    src: kitty.conf.j2
    dest: "{{ ansible_env.HOME }}/.config/kitty/kitty.conf"
    backup: yes

- name: Remove custom tab_bar.py
  file:
    path: "{{ ansible_env.HOME }}/.config/kitty/tab_bar.py"
    state: absent

- name: Copy kitty zsh integration
  copy:
    src: kitty.zsh
    dest: "{{ ansible_env.HOME }}/.config/kitty/kitty.zsh"

- name: Source kitty.zsh from zshrc
  lineinfile:
    path: "{{ ansible_env.HOME }}/.zshrc"
    line: "source ~/.config/kitty/kitty.zsh"
    state: present

- name: Build leader binary
  command:
    cmd: cargo build --release --manifest-path roles/kitty/leader/Cargo.toml
    chdir: "{{ playbook_dir }}"
  changed_when: true

- name: Copy leader binary
  copy:
    src: "{{ playbook_dir }}/roles/kitty/leader/target/release/leader"
    dest: "{{ ansible_env.HOME }}/.config/kitty/leader"
    mode: "0755"
