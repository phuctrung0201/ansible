- name: Install kitty
  homebrew:
    name: kitty
    state: present

- name: Ensure the kitty config directory exists
  file:
    path: "{{ ansible_env.HOME }}/.config/kitty"
    state: directory

- name: Copy kitty config
  copy:
    src: kitty.conf
    dest: "{{ ansible_env.HOME }}/.config/kitty/kitty.conf"
    backup: yes

- name: Copy leader script
  copy:
    src: leader.sh
    dest: "{{ ansible_env.HOME }}/.config/kitty/leader.sh"
    mode: "0755"

- name: Copy kitty zsh integration
  copy:
    src: kitty.zsh
    dest: "{{ ansible_env.HOME }}/.config/kitty/kitty.zsh"

- name: Source kitty.zsh from zshrc
  lineinfile:
    path: "{{ ansible_env.HOME }}/.zshrc"
    line: "source ~/.config/kitty/kitty.zsh"
    state: present
