# =============================================================================
# Remote control
# =============================================================================
allow_remote_control yes
listen_on            unix:/tmp/kitty

# =============================================================================
# Font
# =============================================================================
font_family FiraCode Nerd Font Mono
font_size   16.0

# =============================================================================
# Color scheme (Catppuccin Macchiato)
# =============================================================================
foreground            #cad3f5
background            #24273a
selection_foreground  #24273a
selection_background  #c6a0f6

url_color             #8aadf4
cursor_text_color     #24273a
cursor_shape          beam

# Normal colors
color0  #494d64
color1  #ed8796
color2  #a6da95
color3  #eed49f
color4  #8aadf4
color5  #f5bde6
color6  #8bd5ca
color7  #cad3f5

# Bright colors
color8  #5b6078
color9  #ed8796
color10 #a6da95
color11 #eed49f
color12 #8aadf4
color13 #f5bde6
color14 #8bd5ca
color15 #a5adcb

# =============================================================================
# Tab bar
# =============================================================================
tab_bar_style           hidden
tab_bar_background      #1e2030
active_tab_foreground   #24273a
active_tab_background   #c6a0f6
active_tab_font_style   bold
inactive_tab_foreground #6e738d

# =============================================================================
# Window
# =============================================================================
hide_window_decorations titlebar-only
background_opacity      0.85
background_blur         30
enabled_layouts         tall
active_border_color     #c6a0f6
inactive_border_color   #5b6078

# =============================================================================
# Scrollback
# =============================================================================
scrollback_pager nvim -c 'lua require("ansify").pager({on_finish=function() vim.cmd("normal G") end})' -

# =============================================================================
# Key mappings
# =============================================================================
map opt+l launch --cwd=current --type=overlay ~/.config/kitty/leader
