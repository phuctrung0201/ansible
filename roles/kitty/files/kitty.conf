# =============================================================================
# Font
# =============================================================================
font_family FiraCode Nerd Font Mono
font_size   16.0

# =============================================================================
# Color scheme (Dracula)
# =============================================================================
foreground            #f8f8f2
background            #1a1b26
selection_foreground  #ffffff
selection_background  #44475a

url_color             #8be9fd
cursor_text_color     #282a36
cursor_shape          beam

# Normal colors
color0  #21222c
color1  #ff5555
color2  #50fa7b
color3  #f1fa8c
color4  #bd93f9
color5  #ff79c6
color6  #8be9fd
color7  #f8f8f2

# Bright colors
color8  #6272a4
color9  #ff6e6e
color10 #69ff94
color11 #ffffa5
color12 #d6acff
color13 #ff92df
color14 #a4ffff
color15 #ffffff

# =============================================================================
# Tab bar
# =============================================================================
tab_bar_style           powerline
tab_powerline_style     angled
tab_bar_background      #1a1b26
active_tab_foreground   #1a1b26
active_tab_background   #bd93f9
active_tab_font_style   bold
inactive_tab_foreground #6272a4

# =============================================================================
# Window
# =============================================================================
hide_window_decorations titlebar-only
background_opacity      0.8
background_blur         10
enabled_layouts         tall
active_border_color     #f8f8f2
inactive_border_color   #6272a4

# =============================================================================
# Scrollback
# =============================================================================
scrollback_pager nvim -c 'lua require("ansify").pager({on_finish=function() vim.cmd("normal G") end})' -

# =============================================================================
# Key mappings
# =============================================================================
map --new-mode leader --on-action end --on-unknown end shift+space
map --mode leader e send_text all \x18\x05
map --mode leader f show_scrollback
map --mode leader h open_url_with_hints
map --mode leader r send_text all \x12
map --mode leader escape pop_keyboard_mode