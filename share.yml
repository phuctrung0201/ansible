# Theme — https://spec.draculatheme.com/ (§1.2 Standard + ANSI)
theme:
  # --- §1.2.1 Standard ---
  bg: "#282a36"
  fg: "#f8f8f2"
  selection: "#44475a"
  comment: "#6272a4"
  red: "#ff5555"
  orange: "#ffb86c"
  yellow: "#f1fa8c"
  green: "#50fa7b"
  purple: "#bd93f9"
  cyan: "#8be9fd"
  pink: "#ff79c6"

  # ANSI Blue (§1.2.2) is Purple; kept as `blue` for terminal color4 / templates.
  blue: "#bd93f9"

  # --- §1.2.2 ANSI ---
  dark: "#21222c" # AnsiBlack
  white: "#f8f8f2" # AnsiWhite (same as fg)
  bright_red: "#ff6e6e"
  bright_green: "#69ff94"
  bright_yellow: "#ffffa5"
  bright_purple: "#d6acff" # AnsiBrightBlue
  bright_pink: "#ff92df" # AnsiBrightMagenta
  bright_cyan: "#a4ffff"
  bright_white: "#ffffff" # AnsiBrightWhite

  # AnsiBrightBlack — spec uses same hex as Comment (#6272A4).
  comment_bright: "#6272a4"

  # AnsiBlack — dracula.nvim `black` / terminal bold black contexts
  black: "#21222c"

  # Neovim-only (dracula.nvim defaults; not in core syntax spec)
  visual: "#3e4452"
  gutter_fg: "#4b5263"
  nontext: "#3b4048"

  rosewater: "#ff79c6" # alias of Pink — fzf / legacy

  # nb ANSI 256 (purple / pink)
  nb_primary: 141
  nb_secondary: 212
